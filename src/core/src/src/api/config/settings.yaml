# Cortex AI Configuration

app:
  name: "Cortex AI"
  version: "1.0.0"
  debug: true

brain:
  model: "gpt-3.5-turbo"
  temperature: 0.7
  max_tokens: 500
  memory_limit: 100

api:
  host: "0.0.0.0"
  port: 8000
  reload: true

plugins:
  enabled:
    - "core"
    - "nlp"
  disabled: []

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
